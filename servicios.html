        header {

            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-logo-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }

            font-family: var(--fuente-titulo);

        .nav-links a {

            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .menu-toggle { display: none; cursor: pointer; font-size: 1.8rem; color: var(--blanco); }

        /* --- Sección de Servicios (NUEVA) --- */
        .container-servicios {
            padding: 60px 5%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
            min-height: calc(100vh - 400px);
        }

        .servicio-circulo {
            position: relative;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            overflow: hidden;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .servicio-circulo:hover {
            transform: scale(1.03);
        }

        .servicio-circulo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            z-index: 1;
        }

        .overlay-verde {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(118, 155, 124, 0.65); /* Color primario con opacidad */
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .servicio-circulo h2 {
            color: var(--blanco);
            font-family: var(--fuente-titulo);
            font-size: 2.2rem;
            z-index: 3;
            text-transform: uppercase;

        .horario { margin-top: 15px; font-size: 0.9rem; font-weight: 300; letter-spacing: 0.5px; }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-links { 
                display: none; position: absolute; top: 100%; left: 0; width: 100%; 
                background: var(--color-texto); flex-direction: column; padding: 40px 20px;
                box-shadow: 0 10px 15px rgba(0,0,0,0.3);
            }
            .nav-links.active { display: flex; }
            .nav-links li { margin: 20px 0; width: 100%; text-align: center; }
